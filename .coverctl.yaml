version: 1
language: go
policy:
  default:
    min: 80
  domains:
    # cmd is a 3-line os.Exit(cli.Run(...)) wrapper — no logic to unit-test.
    - name: cmd
      match:
        - ./cmd/...
      min: 0
    - name: application
      match:
        - ./internal/application/...
      min: null
    - name: cli
      match:
        - ./internal/cli/...
      min: null
    - name: domain
      match:
        - ./internal/domain/...
      min: null
    - name: infrastructure
      match:
        - ./internal/infrastructure/...
      min: null
    - name: mcp
      match:
        - ./internal/mcp/...
      min: null
    - name: policy
      match:
        - ./internal/policy/...
      min: null
    - name: service
      match:
        - ./internal/service/...
      min: null
