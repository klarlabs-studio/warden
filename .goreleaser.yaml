# goreleaser builds the static warden binaries that every distribution channel
# (npm wrapper, install.sh, brew, the self-installing hook) ships. One build,
# many channels — the binary is the single source of truth.
version: 2

project_name: warden

before:
  hooks:
    - go mod tidy

builds:
  - id: warden
    main: .
    binary: warden
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    # Stamp the release version into the binary's cli.Version.
    ldflags:
      - -s -w -X go.klarlabs.de/warden/internal/cli.Version={{ .Version }}

archives:
  - id: warden
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "warden_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# Sign checksums.txt (and emit the signing certificate) with cosign keyless
# (Sigstore: Fulcio cert + Rekor transparency log). The digest list that
# install.sh, install.ps1 and the self-fetching git hook verify downloads
# against is thereby itself verifiable — closing the "unsigned checksums" gap.
# Requires cosign on the release runner and `id-token: write` for the OIDC
# keyless flow (see .github/workflows/release.yml).
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  github:
    owner: klarlabs-studio
    name: warden

homebrew_casks:
  - repository:
      owner: felixgeelhaar
      name: homebrew-tap
      # The default GITHUB_TOKEN is scoped to this repo only and cannot push to
      # the separate tap repo (403); use the dedicated tap PAT.
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://go.klarlabs.de/warden
    description: Configurable git commit/push gate — native hooks, worktree isolation, cryptographic provenance
    license: MIT
    # The binary isn't notarized, so Gatekeeper quarantines it and the first
    # `warden` invocation hangs/blocks on an unsigned-binary check. Strip the
    # quarantine attribute on install so the CLI runs immediately.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/warden"]
          end
