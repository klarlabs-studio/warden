version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
    groups:
      go-deps: { patterns: ["*"] }
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(ci)" }
  - package-ecosystem: npm
    directory: "/npm"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
