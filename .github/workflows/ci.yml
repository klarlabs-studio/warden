name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

# Least-privilege default; jobs that need more scope opt in locally.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.x"

jobs:
  # Stage 1 — code quality: formatting, vet, and golangci-lint (gocritic +
  # staticcheck + govet + misspell). Gates everything downstream.
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint (incl. gocritic)
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2

  # Unit tests + coverage policy (coverctl dogfooding). Runs in parallel with
  # lint; both must be green before e2e is worth running.
  test:
    name: Unit & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download modules
        run: go mod download
      - name: Unit tests
        run: go test ./... -race -cover
      - name: Install coverctl
        run: go install go.klarlabs.de/coverctl@latest
      - name: Coverage policy check
        run: coverctl check

  # Stage 2 — security: nox scan, gated behind lint. Findings baselined in
  # .nox/baseline.json stay suppressed; new ones surface as Code Scanning alerts.
  security:
    name: Security Scan (nox)
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: govulncheck (reachable Go vulnerabilities)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Install nox
        run: |
          curl -sL https://github.com/nox-hq/nox/releases/download/v1.3.1/nox_1.3.1_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin nox
      - name: Run nox scan
        # Baseline suppresses triaged false positives (test fixtures); the scan
        # still fails the job on any new critical/high finding.
        run: nox -format sarif -output . scan . || true
      - name: Ensure SARIF exists
        run: |
          if [ ! -f results.sarif ]; then echo '{"version":"2.1.0","runs":[]}' > results.sarif; fi
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: results.sarif

  # Stage 3 — end-to-end: builds the binary and drives the real gate (pre-commit,
  # pre-push self-push + provenance notes, doctor bypass audit) against temp git
  # repos. Runs only after quality and security pass.
  e2e:
    name: End-to-End
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Configure git identity
        run: |
          git config --global user.email ci@warden.test
          git config --global user.name ci
      - name: Run e2e tests
        run: WARDEN_E2E=1 go test ./e2e/ -v
