name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The shared klarlabs-studio Go CI: gofmt, golangci-lint (gocritic), race
  # tests, the coverctl coverage gate, and a nox security scan (SARIF -> code
  # scanning). Pinned tool/action versions live in one place and every repo
  # picks up the bump.
  ci:
    uses: klarlabs-studio/.github/.github/workflows/go-ci.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    secrets: inherit
    with:
      # unix-first: native git hooks, disposable worktrees, and a unix-socket
      # attach channel — no OS-specific matrix needed.
      cross-platform: false

  # warden-specific end-to-end: build the binary and drive the real gate
  # (pre-commit, pre-push self-push + provenance notes, doctor bypass audit)
  # against throwaway git repos. Gated behind the shared CI so it runs only once
  # quality + security are green.
  e2e:
    name: End-to-End
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Configure git identity
        run: |
          git config --global user.email ci@warden.test
          git config --global user.name ci
      - name: Run e2e tests
        run: WARDEN_E2E=1 go test ./e2e/ -v
