name: Release

on:
  push:
    # Full semver tags only (v0.16.0, v0.17.0-rc1). The floating major tag the
    # major-tag job maintains (v0) has no dots, so moving it never re-triggers a
    # release.
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # cosign keyless signing of checksums.txt (OIDC → Fulcio)

# A tag must produce exactly one release run — two concurrent runs race to
# upload the same asset names and both fail with 422 already_exists.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the binaries + GitHub Release + brew formula.
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      # cosign is invoked by goreleaser's `signs:` block to sign checksums.txt.
      - uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN scopes the tap-repo push for the brew formula.
          TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Attach CycloneDX + SPDX SBOMs to the release, matching fortify/mcp/
      # statekit. nox scan exits non-zero on findings (even baselined) — SBOM
      # generation must not gate on that, so tolerate the exit code and verify
      # the artifacts before uploading them to the goreleaser-created release.
      - name: Generate + attach SBOM
        run: |
          go install github.com/nox-hq/nox/cli@v0.8.1
          mv "$(go env GOPATH)/bin/cli" "$(go env GOPATH)/bin/nox"
          mkdir -p release-artifacts
          nox -format cdx,spdx -output release-artifacts scan . || true
          test -s release-artifacts/sbom.cdx.json
          test -s release-artifacts/sbom.spdx.json
          gh release upload "${GITHUB_REF_NAME}" \
            release-artifacts/sbom.cdx.json \
            release-artifacts/sbom.spdx.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Assemble the per-platform npm packages from the same binaries and publish
  # them + the main wrapper. The wrapper carries no logic — just launches the
  # binary — so npm is purely a delivery channel.
  # Independent of goreleaser: it rebuilds the binaries itself and only touches
  # npm, so a brew/tap hiccup in goreleaser never blocks the npm channel.
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      # registry-url IS required. The official npm trusted-publishing docs example
      # sets it, and setup-node's registry-url is what points npm at npmjs and lets
      # its OIDC detection engage. Omitting it (an earlier misreading) left npm on
      # no explicit registry → it never entered the trusted-publishing path and
      # fell back to token auth → ENEEDAUTH. Node 24's bundled npm is >= 11.5.1
      # (the floor); no force-install needed.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Report toolchain
        run: echo "node $(node -v) / npm $(npm -v)"
      - name: Build binaries
        run: go run github.com/goreleaser/goreleaser/v2@latest build --clean --snapshot=false
      - name: Assemble npm packages
        run: node npm/scripts/build-packages.mjs "${GITHUB_REF_NAME#v}"
      # npm trusted publishing (OIDC). registry-url (above) engages OIDC — but it
      # also makes setup-node seed .npmrc with `_authToken=${NODE_AUTH_TOKEN}` and
      # a PLACEHOLDER NODE_AUTH_TOKEN. npm would use that invalid token for the
      # publish PUT (→ 404) even though provenance signs via OIDC. Setting
      # NODE_AUTH_TOKEN="" empties the .npmrc token so the publish itself falls to
      # OIDC. id-token: write is granted at the workflow level; no real token used.
      # Publish from INSIDE each package dir (cd).
      - name: Publish platform packages
        env:
          # Clear setup-node's placeholder NODE_AUTH_TOKEN so npm does not use it
          # (an invalid token) for the publish PUT. registry-url engages OIDC
          # (provenance signs fine); an empty token forces the publish onto OIDC
          # too, matching the trusted publisher. Without this the PUT 404s.
          NODE_AUTH_TOKEN: ""
        run: |
          for d in npm/packages/*/; do
            ( cd "$d" && npm publish --provenance --access public )
          done
      - name: Publish wrapper
        env:
          NODE_AUTH_TOKEN: ""
        run: cd npm && npm publish --provenance --access public

  # Move a floating major-version tag (v0, v1, …) onto this release so consumers
  # can pin the reusable action as `warden-gate@v0` and track the latest release
  # within the major line. Runs only after both delivery channels publish, so the
  # tag never advances to a half-released version. Its own tag push is filtered
  # out of this workflow's trigger (v*.*.* — the bare major has no dots), so it
  # can't re-trigger a release. Prereleases don't move it. Consumers wanting an
  # immutable ref pin an exact version or commit SHA (see docs/ci-provenance-gate.md).
  major-tag:
    needs: [goreleaser, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write # force-push the floating major tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Move floating major tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"    # e.g. v0.16.0
          case "$tag" in
            *-*) echo "prerelease $tag: leaving the major tag where it is"; exit 0 ;;
          esac
          major="${tag%%.*}"          # e.g. v0
          git tag -f "$major" "${GITHUB_SHA}"
          git push -f origin "refs/tags/$major"
          echo "moved $major -> $tag (${GITHUB_SHA})"

env:
  GO_VERSION: "1.26.x"
