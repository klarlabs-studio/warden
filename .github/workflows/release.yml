name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release

# A tag must produce exactly one release run — two concurrent runs race to
# upload the same asset names and both fail with 422 already_exists.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the binaries + GitHub Release + brew formula.
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN scopes the tap-repo push for the brew formula.
          TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # Assemble the per-platform npm packages from the same binaries and publish
  # them + the main wrapper. The wrapper carries no logic — just launches the
  # binary — so npm is purely a delivery channel.
  # Independent of goreleaser: it rebuilds the binaries itself and only touches
  # npm, so a brew/tap hiccup in goreleaser never blocks the npm channel.
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build binaries
        run: go run github.com/goreleaser/goreleaser/v2@latest build --clean --snapshot=false
      - name: Assemble npm packages
        run: node npm/scripts/build-packages.mjs "${GITHUB_REF_NAME#v}"
      - name: Publish platform packages
        run: |
          for d in npm/packages/*/; do
            npm publish --access public "$d"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish wrapper
        run: npm publish --access public npm/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

env:
  GO_VERSION: "1.26.x"
