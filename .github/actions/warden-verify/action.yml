name: "Warden Verify"
description: >-
  Provenance-skip: report whether a commit was already validated by the warden
  gate (an intact refs/notes/warden record), so CI can trust it and skip
  re-running the checks warden already ran.

inputs:
  commit:
    description: "Commit to verify"
    required: false
    default: ${{ github.sha }}
  remote:
    description: "Remote holding refs/notes/warden"
    required: false
    default: origin
  key:
    description: >-
      Trusted signer key(s) or fingerprint(s), comma-separated. When set, the
      commit's note must also carry a valid signature from one of these keys —
      provenance-skip then means "a warden I trust ran here", not just "a warden
      ran here". Get a fingerprint with `warden key show`.
    required: false
    default: ""

outputs:
  validated:
    description: "true when the commit carries an intact warden validation note"
    value: ${{ steps.check.outputs.validated }}

runs:
  using: composite
  steps:
    # warden is a Go install; the caller must have run actions/setup-go first.
    # GOTOOLCHAIN=auto lets `go install` fetch the toolchain warden requires when
    # the runner's Go (from the repo's go.mod) is older than warden's minimum.
    - name: Install warden
      shell: bash
      run: GOTOOLCHAIN=auto go install go.klarlabs.de/warden@latest

    - name: Fetch warden notes
      shell: bash
      run: git fetch "${{ inputs.remote }}" 'refs/notes/warden:refs/notes/warden' || true

    - id: check
      shell: bash
      run: |
        KEY_ARG=()
        if [ -n "${{ inputs.key }}" ]; then KEY_ARG=(--key "${{ inputs.key }}"); fi
        if warden verify --commit "${{ inputs.commit }}" "${KEY_ARG[@]}" --quiet; then
          echo "validated=true" >> "$GITHUB_OUTPUT"
          echo "warden: ${{ inputs.commit }} already validated — CI can skip its checks."
        else
          echo "validated=false" >> "$GITHUB_OUTPUT"
          echo "warden: ${{ inputs.commit }} not validated — CI should run its checks."
        fi
