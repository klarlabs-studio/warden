agent: auto
hooks:
  pre_commit: true
  pre_push: false
commands:
  # Mirror CI stage 1: golangci-lint runs gofmt/goimports formatters + govet +
  # staticcheck + gocritic, so one command is the whole quality gate.
  lint: "golangci-lint run ./..."
  # Mirror CI unit + e2e stages.
  test: "go test -race ./... && go test -tags e2e ./e2e/"
  # A config-defined custom step: any step name with a command here runs it —
  # no code, no installed binary. nox applies the committed .nox/baseline.json,
  # so only unwaived high/critical findings fail the gate.
  security-scan: "nox scan . -severity-threshold high"
steps:
  # pre-commit stays fast: quality gate only.
  pre_commit: [lint]
  # pre-push mirrors CI order: quality -> security -> tests.
  pre_push: [rebase, lint, security-scan, test]
risk:
  diff_lines_high: 400
  files_touched_high: 15
# Trusted provenance signers (ADR-0002 Phase 3). The warden-gate action (see
# .github/workflows/provenance.yml) and a bare `warden verify --range` require a
# note signed by one of these. Add yours with `warden key show`; list with
# `warden key list`.
trusted_keys:
  - 139e6eb9e2611c76   # felix — primary dev machine
rules:
  # Large changes on main get a human approval gate at push time.
  - match:
      branch: main
      risk: high
    then:
      require_approval: true
